name: CD

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  REPOSITORY: webhook-pipeline
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/webhook-pipeline/webhook-pipeline

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy webhook-pipeline-api \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --command="node" \
            --args="dist/api/server.js" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}"

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy webhook-pipeline-worker \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --no-allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=2 \
            --port=8080 \
            --command="node" \
            --args="dist/worker/worker.js" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}"

      - name: Run database migrations
        run: |
          gcloud run jobs create webhook-pipeline-migrate \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --command="npm" \
            --args="run,db:migrate:prod" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --max-retries=1 \
            || gcloud run jobs update webhook-pipeline-migrate \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --command="npm" \
            --args="run,db:migrate:prod" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}"

          gcloud run jobs execute webhook-pipeline-migrate \
            --region=${{ env.REGION }} \
            --wait

      - name: Get API URL
        run: |
          URL=$(gcloud run services describe webhook-pipeline-api \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ API deployed at: $URL"
          echo "API_URL=$URL" >> $GITHUB_STEP_SUMMARY